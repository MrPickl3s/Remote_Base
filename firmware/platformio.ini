; Remote Base — PlatformIO configuration
; Target: Freematics ONE+ Model H (ESP32, 16MB flash, 8MB PSRAM)
;
; *** BEFORE FIRST COMPILE ***
; Copy the FreematicsPlus library into firmware/lib/:
;   git clone --depth 1 https://github.com/stanleyhuangyc/Freematics.git /tmp/Freematics
;   cp -r /tmp/Freematics/libraries/FreematicsPlus lib/
; Do NOT copy FreematicsONE — that's for older Model A/B hardware.

[platformio]
src_dir = src
lib_dir = lib

[env:freematics_one_h]
platform           = espressif32
board              = esp32dev
framework          = arduino
board_build.flash_size   = 16MB
board_build.partitions   = default_16MB.csv
upload_speed       = 921600
monitor_speed      = 115200
build_flags        =
  -DCORE_DEBUG_LEVEL=0    ; Set to 5 for verbose ESP-IDF debug output
